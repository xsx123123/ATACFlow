# ATACFlow Complete Analysis Configuration
# Version: ATACFlow_v0.0.5
# Use this for comprehensive chromatin accessibility analysis

# === Basic Project Information ===
project_name: 'PRJNA_ATAC_Complete'
Genome_Version: "hg38"
species: 'Homo_sapiens'
client: 'Research_Lab'

# === Data Path Configuration ===
raw_data_path:
  - /project/00.raw_data
sample_csv: /project/01.workflow/samples.csv
paired_csv: /project/01.workflow/contrasts.csv
workflow: /project/01.workflow
data_deliver: /project/02.data_deliver

# === Execution Parameters ===
execution_mode: local
mapping_tools: chromap  # chromap (fast) or bowtie2 (compatible)
Library_Types: fr-firststrand

# === Analysis Module Switches ===
# All modules enabled for complete analysis
only_qc: false
diff_peaks: true
fastq_screen: true
report: true

# === Peak Calling Configuration ===
peak_calling:
  use_pooled_peaks: true  # Use group-pooled peaks for DEG

# === Optional Monitoring Configuration ===
# Uncomment to enable Loki + Grafana monitoring
# loki_url: "http://loki-server:3100"

# === Notes ===
# This configuration runs:
# - QC & Trimming (FastQC + fastp)
# - Contamination Check (FastQ Screen)
# - Chromap or Bowtie2 Mapping
# - Samtools filtering + PCR duplicate removal
# - Organellar read filtering (mitochondria/chloroplast)
# - ataqv ATAC-seq QC
# - MACS2 Peak Calling (single + pooled + IDR)
# - Consensus peak generation
# - DESeq2 Differential Peak Analysis + GO/KEGG Enrichment
# - TOBIAS Footprinting + Motif Analysis
# - MultiQC + HTML Report
