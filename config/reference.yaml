# reference:
reference_path : /data/jzhang/reference/ATACFlow_reference
# FastQ Screen Database Root Path (For migration)
# This path should contain subdirectories like 'hg38', 'GRCm39', 'fastq_screen_database', etc.
fastq_screen_db_path: /data/jzhang/reference/fastq_screen_database
# Support gene version
can_use_genome_version:
  - Lsat_Salinas_v11
  - Lsat_Salinas_v11_wx
  - hg38
  - GO
# MCP Genome Version
mcp_genome_version: 
  Lsat_Salinas_v11:
    name: Lsat_Salinas_v11
    description: Lettuce reference genome (v11)
  Lsat_Salinas_v11_wx:
    name: Lsat_Salinas_v11_wx
    description: Lettuce reference genome (v11) power by wang xing
  hg38:
    name: hg38
    description: Human reference genome (GRCh38)
# Bowtie2 Reference PATH
Bowtie2_index:
    Lsat_Salinas_v11:
      index: Lactuca_sativa_V11_ncbi/Lsat_Salinas_v11_index/Lsat_Salinas_v11
      chromap_index: Lactuca_sativa_V11_ncbi/Lactuca_sativa_V11_ncbi_chromap_index
