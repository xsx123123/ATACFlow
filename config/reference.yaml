      tss_bed:  Lactuca_sativa_V11_ncbi/GCF_002870075.4_Lsat_Salinas_v11_genomic_fix_id_tss.bed
      autosomes: Lactuca_sativa_V11_ncbi/Lactuca_sativa_V11_autosomes.txt
